<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <link href="./output.css" rel="stylesheet" />

    <title>Frontend Mentor | Multi-step form</title>

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
    <style>
      .attribution {
        font-size: 0.6875rem;
        text-align: center;
      }
      .attribution a {
        color: hsl(228, 45%, 44%);
      }
    </style>
  </head>
  <body class="font-ubuntu min-h-screen bg-blue-100 md:flex md:items-center">
    <main
      class="flex flex-col md:flex-row md:bg-white md:p-4 md:w-[calc(100%-5.125rem)] md:max-w-[42.875rem] md:m-auto md:rounded-2xl"
    >
      <aside
        class="bg-[url(/assets/images/bg-sidebar-mobile.svg)] md:bg-[url(/assets/images/bg-sidebar-desktop.svg)] py-8 md:py-10 px-[1.688rem] h-43 md:h-auto md:shrink-0 md:rounded-[0.625rem]"
      >
        <ol class="flex gap-4 md:gap-8 text-white justify-center md:flex-col">
          <li class="flex items-center gap-4">
            <span
              class="flex justify-center items-center size-[2.063rem] rounded-full border border-white text-preset-4-bold"
              >1</span
            >
            <div class="hidden md:block">
              <p class="uppercase text-blue-300 text-preset-5">Step 1</p>
              <p class="uppercase text-preset-4-bold">Your info</p>
            </div>
          </li>
          <li class="flex items-center gap-4">
            <span
              class="flex justify-center items-center size-[2.063rem] rounded-full border border-white text-preset-4-bold"
              >2</span
            >
            <div class="hidden md:block">
              <p class="uppercase text-blue-300 text-preset-5">Step 2</p>
              <p class="uppercase text-preset-4-bold">Select plan</p>
            </div>
          </li>
          <li class="flex items-center gap-4">
            <span
              class="flex justify-center items-center size-[2.063rem] rounded-full border border-white text-preset-4-bold"
              >3</span
            >
            <div class="hidden md:block">
              <p class="uppercase text-blue-300 text-preset-5">Step 3</p>
              <p class="uppercase text-preset-4-bold">Add-ons</p>
            </div>
          </li>
          <li class="flex items-center gap-4">
            <span
              class="flex justify-center items-center size-[2.063rem] rounded-full border border-white text-preset-4-bold"
              >4</span
            >
            <div class="hidden md:block">
              <p class="uppercase text-blue-300 text-preset-5">Step 4</p>
              <p class="uppercase text-preset-4-bold">Summary</p>
            </div>
          </li>
        </ol>
      </aside>
      <form
        method="post"
        class="px-6 md:px-[3.625rem] py-8 md:py-4 w-[calc(100%-2rem)] m-auto -mt-[4.688rem] md:mt-0 bg-white rounded-[0.625rem]"
      >
        <fieldset>
          <legend>Personal info</legend>
          <p>Please provide your name, email address, and phone number.</p>
          <label for="name">
            Name
            <input
              type="text"
              id="name"
              name="name"
              placeholder="e.g. Stephen King"
              required
            />
          </label>
          <label for="email">
            Email Address
            <input
              type="email"
              id="email"
              name="email"
              placeholder="e.g. stephenking@lorem.com"
              required
            />
          </label>
          <label for="phone-number">
            Phone Number
            <input
              type="tel"
              id="phone"
              name="phone"
              placeholder="e.g. +1 234 567 890"
              autocomplete="tel"
              required
            />
          </label>
        </fieldset>
        <div
          class="bg-white p-4 flex justify-end absolute w-full bottom-0 left-0 md:static md:p-0 md:mt-21"
        >
          <button
            type="button"
            class="bg-blue-950 text-white font-sm/[150%] font-medium px-4 py-[0.594rem] rounded-sm cursor-pointer"
          >
            Next Step
          </button>
        </div>
      </form>
    </main>
