<!doctype html>
<html lang="en">

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <link href="./output.css" rel="stylesheet" />

    <title>Frontend Mentor | Multi-step form</title>

    <script src="./script.js" defer></script>

  <body
    class="font-ubuntu min-h-screen bg-blue-100 md:flex md:items-center text-blue-950"
  >
    <main
      class="flex flex-col md:flex-row md:bg-white md:p-4 md:w-[calc(100%-5.125rem)] md:max-w-[58.75rem] md:m-auto md:rounded-2xl"
    >
      <aside
        class="bg-[url(/assets/images/bg-sidebar-mobile.svg)] md:bg-[url(/assets/images/bg-sidebar-desktop.svg)] py-8 md:py-10 px-[1.688rem] h-43 md:h-auto md:shrink-0 md:rounded-[0.625rem] md:w-[35%] md:max-w-[17.125rem] bg-no-repeat bg-cover bg-center"
      >
        <ol class="flex gap-4 md:gap-8 text-white justify-center md:flex-col">
          <li class="flex items-center gap-4">
            <span
              class="flex justify-center items-center size-[2.063rem] rounded-full border border-white text-preset-4-bold"
              >1</span
            >
            <div class="hidden md:block">
              <p class="uppercase text-blue-300 text-preset-5">Step 1</p>
              <p class="uppercase text-preset-4-bold">Your info</p>
            </div>
          </li>
          <li class="flex items-center gap-4">
            <span
              class="flex justify-center items-center size-[2.063rem] rounded-full border border-white text-preset-4-bold"
              >2</span
            >
            <div class="hidden md:block">
              <p class="uppercase text-blue-300 text-preset-5">Step 2</p>
              <p class="uppercase text-preset-4-bold">Select plan</p>
            </div>
          </li>
          <li class="flex items-center gap-4">
            <span
              class="flex justify-center items-center size-[2.063rem] rounded-full border border-white text-preset-4-bold"
              >3</span
            >
            <div class="hidden md:block">
              <p class="uppercase text-blue-300 text-preset-5">Step 3</p>
              <p class="uppercase text-preset-4-bold">Add-ons</p>
            </div>
          </li>
          <li class="flex items-center gap-4">
            <span
              class="flex justify-center items-center size-[2.063rem] rounded-full border border-white text-preset-4-bold"
              >4</span
            >
            <div class="hidden md:block">
              <p class="uppercase text-blue-300 text-preset-5">Step 4</p>
              <p class="uppercase text-preset-4-bold">Summary</p>
            </div>
          </li>
        </ol>
      </aside>
      <div class="px-4 md:px-12 md:py-8 -mt-[4.688rem] md:mt-0 w-full">
        <form
          method="post"
          class="md:max-w-[28.125rem] m-auto bg-white rounded-[0.625rem] px-6 py-8 md:p-0"
        >
          <fieldset id="info-form" data-step="1">
            <legend class="text-preset-2 text-blue-950 mb-2 md:text-preset-1">
              Personal info
            </legend>
            <p
              class="text-preset-3-regular text-grey-500 mb-6 md:mb-8 lg:mb-10"
            >
              Please provide your name, email address, and phone number.
            </p>
            <label
              class="text-preset-5 inline-block mb-2 md:text-preset-4-regular"
              for="name"
            >
              Name
            </label>
            <input
              class="w-full px-4 py-[0.594rem] md:py-[0.906rem] text-preset-4-medium md:text-preset-3-medium placeholder:text-grey-500 border border-purple-200 rounded-sm mb-4 md:mb-6"
              type="text"
              id="name"
              name="name"
              placeholder="e.g. Stephen King"
              required
            />
            <label
              class="text-preset-5 inline-block mb-2 md:text-preset-4-regular"
              for="email"
            >
              Email Address
            </label>
            <input
              class="w-full px-4 py-[0.594rem] md:py-[0.906rem] text-preset-4-medium md:text-preset-3-medium placeholder:text-grey-500 border border-purple-200 rounded-sm mb-4 md:mb-6"
              type="email"
              id="email"
              name="email"
              placeholder="e.g. stephenking@lorem.com"
              required
            />
            <label
              class="text-preset-5 inline-block mb-2 md:text-preset-4-regular"
              for="phone-number"
            >
              Phone Number
            </label>
            <input
              class="w-full px-4 py-[0.594rem] md:py-[0.906rem] text-preset-4-medium md:text-preset-3-medium placeholder:text-grey-500 border border-purple-200 rounded-sm"
              type="tel"
              id="phone"
              name="phone"
              placeholder="e.g. +1 234 567 890"
              autocomplete="tel"
              required
            />
          </fieldset>
          <fieldset id="plan-form" class="hidden" data-step="2">
            <legend>Select your plan</legend>
          </fieldset>
          <fieldset id="add-ons-form" class="hidden" data-step="3">
            <legend>Pick add-ons</legend>
          </fieldset>
          <fieldset id="summary-form" class="hidden" data-step="4">
            <legend>Finishing up</legend>
          </fieldset>
          <div
            class="bg-white p-4 flex justify-end absolute w-full bottom-0 left-0 md:static md:p-0 md:mt-21 lg:mt-20"
          >
            <button
              id="next-btn"
              type="button"
              class="bg-blue-950 text-white font-sm/[150%] font-medium px-4 md:px-6 py-[0.594rem] md:py-[0.906rem] rounded-sm cursor-pointer md:rounded-lg"
            >
              Next Step
            </button>
          </div>
        </form>
      </div>
    </main>
